go_nogo:
  verdict: "no_go"
  criterion: >
    A non-trivial partition (N>=2) at the ScopeSpec working epsilon (0.05) with the
    primary observable g_max_percapita.
  decision: "no_go"
  decision_date: "2026-06-02"
  superseded_placeholder:
    note: >
      The previous verdict "go" (N=2, theta*=0.17, eps_working=0.00549, span/eps=3.3)
      was a PLACEHOLDER computed before any pipeline run and at an epsilon (0.00549) that
      does not match the ScopeSpec working_epsilon (0.05). It is WITHDRAWN. See
      Simulationen/transfer_test_dissipation_growth/TEST3_RESULT.md.
  decision_notes: >
    F1 OBSERVABLE INSUFFICIENCY at the working epsilon. Actual pipeline run (2026-06-02):
    g_max_percapita has span 0.018 over rho in [0,0.5]; working eps=0.05 >> span, so the
    cover collapses to N=1 (no transition resolved). EpsilonSweep: N=1 for all eps>=~0.0146;
    multiple regimes appear only at eps<=0.005, below a sigma_Delta-justified resolution.
    transfer_v2 against CASE-0005 therefore returns TRIVIAL_PARTITION (nothing to transfer).
    Falsification id: F1 (observable insufficiency, eps >= eps*(O,X)); severity:
    observable_replacement (NOT scope_rejection). Recommended: switch primary observable to
    the fibre-resolved g_ratio companion, or adopt a sigma_Delta-justified eps<=0.005 with a
    stability mask.
    NOTE: Q-REL-04 (the case's scientific purpose) was nonetheless RESOLVED this session via
    the intrinsic dynamics of the closed (s,i) fraction system (structural break — new endemic
    attractor via transcritical bifurcation), independent of this observable. See
    Simulationen/transfer_test_dissipation_growth/QREL04_RESOLUTION.md.

