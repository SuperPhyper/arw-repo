scientific_value:
  primary: >
    First dimension-growing Dissipation case in ARW/ART.
    Tests whether fibre dimension growth along the order axis constitutes a
    BC-structural break within the Dissipation class (Q-REL-04).
  secondary: >
    First use of g_max_percapita as a non-averaging Dissipation-primary observable
    in an epidemic system. Establishes precedent for observable design in
    dimension-growing systems.
  open_questions:
    - id: Q-REL-04
      status: answered          # 2026-06-02
      question: >
        Is dimension growth along the order axis a BC-structural break within Dissipation,
        or a reparametrisation of the stationary case?
      answer: >
        STRUCTURAL BREAK. Resolved via the intrinsic dynamics of the closed (s,i) fraction
        system, not via the transfer metric Phi (Phi shown invalid for this question;
        g_max_percapita F1-insufficient). The rho*(1-s) replenishment term creates a new
        isolated stable endemic attractor via a transcritical bifurcation at rho*=beta-gamma_r;
        the stationary case (rho=0) has only a degenerate line {i=0}. A new attractor is a
        topological change a reparametrisation cannot produce; the regime partition gains a
        regime. Scope: this instantiation. See QREL04_RESOLUTION.md (Simulationen) and
        docs/notes/research_journal.md (Session 2026-06-02).
