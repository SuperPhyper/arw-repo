phase: "1"
system: "sir_growing"
status: "open"
created_at: "2026-06-02"
updated_at: "2026-06-02"

description: >
  SIR epidemic model with exponentially growing population N(t) = N0*exp(rho*t).
  rho-sweep across [0.0, 0.50], 26 points linear.
  Fixed beta=0.3, gamma_r=0.1, N0=10000.
  Primary observable: g_max_percapita = max_t[(dI/dt)/N(t)] (locked 2026-06-02).
  BC class: Dissipation (population dilution as S4 contraction on infected fraction).
  Secondary BC: Aggregation (constitutive SIR quotient), Coupling (transmission term).
  Analytical threshold: rho* = beta*s0 - gamma_r ~= 0.197.
  ROLE: Scope B in transfer_test_dissipation_growth experiment.
  Research question: does dimension-growing Dissipation constitute a BC-structural break
  relative to dimension-constant Dissipation (CASE-0005)?

