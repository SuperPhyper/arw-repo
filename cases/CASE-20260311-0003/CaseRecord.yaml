#                                   # labyrinth | custom
status: "complete"                      # open | in_progress | complete | failed | archived
created_at: "2026-03-11"
updated_at: "2026-03-12"

description: "Double pendulum, E_target∈[0.5,30 J], 12 sweep points, Restriction BC. N=9 regimes at ε=0.015. Primary: var_rel. Transfer with CASE-0001 (Restriction↔Coupling, Φ=0.40 / Φ≈0.95 at matched ε)."                     # 2-3 sentence plain-language summary

