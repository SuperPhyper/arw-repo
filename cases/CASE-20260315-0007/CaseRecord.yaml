status: "complete"
created_at: "2026-03-15"
updated_at: "2026-06-02"

description: >
  ODE-based SIR epidemic model with beta-sweep across [0.0, 0.5] (51 points).
  Primary observable: I_peak (peak infected fraction).
  BC class: Aggregation (SIR as quotient projection from micro-states).
  Analytical threshold: beta* = gamma_r/S(0) = 0.1/0.99 ~= 0.101.
  First Aggregation-BC case and first EPI-domain case in the ARW/ART repo.
  Control experiment for transfer metric monotonicity (vs CASE-0001, Coupling).

