# ── Go/No-Go Criteria ────────────────────────────────────────────────────────
go_nogo:
  criterion: >
    H1 (Regime Emergence): the ε-sweep over action_dist data from the trained
    unstructured agent shows at least one stable plateau with N >= 2 distinct
    behavioral regime clusters, reproducible across training seeds.
    Primary target: N = 3 (one per zone type).
  measurable_test: >
    epsilon_sweep on action_dist observations produces a plateau of width
    >= 3 consecutive ε values with constant N >= 2. Plateau must be present
    in at least 80% of independent training runs (delta_03 reproducibility).
  threshold: "plateau_width >= 3 AND N_plateau >= 2 AND reproducibility >= 0.80"
  decision: "pending"
  decision_date: ""
  decision_notes: ""

