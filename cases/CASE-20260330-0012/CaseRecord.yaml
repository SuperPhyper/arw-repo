# CaseRecord.yaml — CASE-20260330-0012
# System: Context-navigation labyrinth agent — Emergent Modes Experiment
# Purpose: ARW as post-hoc observation instrument on an unstructured RL policy.
#          Tests whether stable behavioral regime structure emerges from training
#          in a structured multi-zone labyrinth, without prescribed mode architecture.

schema_version: "0.2"
id: "CASE-20260330-0012"
title: "Labyrinth agent — Emergent Modes Experiment (unstructured policy, ARW as observation)"
phase: "emergent"
system: "labyrinth"
status: "open"
created_at: "2026-03-30"
updated_at: "2026-03-30"

description: >
  The Emergent Modes Experiment is the complement of the Designed Modes case
  (CASE-20260329-0011). An unstructured RL policy — no mode library, no mode
  selector, no mode-labeled reward — is trained on the multi-zone labyrinth.
  ARW regime analysis (ε-sweep over action_dist) is applied post-hoc to
  determine whether a stable behavioral partition emerges. The primary hypothesis
  is that training in a structured environment induces zone-differentiated behavior
  detectable as N=3 distinct regime clusters, corresponding to the three zone types
  (R, C, F). A positive result extends ARW's partition claim to emergent, non-architecturally
  prescribed cognitive structure.

