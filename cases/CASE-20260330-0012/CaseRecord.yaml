# ── Scientific Value ─────────────────────────────────────────────────────────
scientific_value:
  primary: >
    First ARW emergence test on a cognitive/computational system with
    endogenous, unarchitecturally-prescribed regime structure. CASE-20260318-0004
    (Stuart-Landau) established ARW emergence for a physical system where the
    emergence condition is analytically known. This case asks whether ARW can
    detect emergence in a behavioral system where no ground-truth emergence
    condition exists — only environmental structure and task optimization.
    A positive result extends the ARW partition claim to a new class of systems.
  secondary: >
    Provides the empirical baseline for comparing designed vs. emergent regime
    structure on the same environment. Together with CASE-20260329-0011, this
    case tests whether prescribed mode architecture produces the same observable
    regime structure as emergent behavioral differentiation — a fundamental
    question about the role of architectural design in regime formation.
  open_questions:
    - id: "Q-EMG-01"
      question: >
        Does the emergent partition arise gradually during training (asymptotic
        convergence, consistent with Q-CNS-03 consolidation hypothesis) or
        abruptly (phase-transition-like, analogous to Stuart-Landau K → K_c)?
    - id: "Q-EMG-02"
      question: >
        Is the emergent partition richer than N = zone count? Could sub-zone
        behavioral strategies produce finer-grained regime clusters?
    - id: "Q-CNS-05"
      question: >
        Do the emergent regimes correspond to the BC classes predicted by
        bc_taxonomy_cognitive_modes? (H2 test — now as emergent result, not by design)
    - id: "Q-CNS-03"
      question: >
        Is consolidation necessary for regime partition stability? (H4 ablation test
        — compare unstructured agent with vs. without consolidation phase)

# ── Relationship to Physical System Cases ────────────────────────────────────
physical_analogs:
  - case_id: "CASE-20260311-0001"
    system: "Kuramoto"
    analog: >
      Agent in coupling zone; action_dist ≅ r_ss as order parameter.
      Both measure a distributional quantity that reflects the degree of
      synchronization / behavioral coordination.
  - case_id: "CASE-20260311-0003"
    system: "Doppelpendel"
    analog: >
      Agent in restriction zone; trajectory_entropy ≅ var_rel.
      Both measure variance / entropy as an indicator of regime regime.
  - case_id: "CASE-20260318-0004"
    system: "Stuart-Landau"
    analog: >
      Emergence condition: the entire experiment corresponds to K → K_c
      in Stuart-Landau. The question is whether training crosses an
      emergence threshold, not which side of K_c the system is on.

