# ScopeSpec — CASE-20260318-0004
# System: Two coupled Stuart-Landau oscillators (K-sweep)
# BC Class: Coupling (primary)
# Purpose: First empirical ARW emergence case — relational collapse window

schema_version: "0.2"
id: "SCOPE-20260318-0004"
title: "Coupled Stuart-Landau oscillators — relational emergence under K-sweep"
status: "active"
created_at: "2026-03-18"
updated_at: "2026-03-18"
system_domain: "physical"

X:
  name: "Joint complex amplitude state of two Stuart-Landau oscillators"
  type: "product"
  structure:
    topology: true
    metric: "required"
    measure: "optional"
  state_coordinates:
    - name: "z1"
      domain: "ℂ  (|z1| < 5)"
      description: "Complex amplitude of oscillator 1"
    - name: "z2"
      domain: "ℂ  (|z2| < 5)"
      description: "Complex amplitude of oscillator 2"
  notes: >
    Joint state space X = ℂ × ℂ ≅ ℝ⁴. Equations of motion:
    dz_i/dt = (λ_i + iω_i - (1+iα)|z_i|²)z_i + K(z_j - z_i)
    Fixed parameters: ω1=1.00, ω2=1.08, α=0.20, λ=1.00, dlambda=0.08
    → λ1 = 1.08, λ2 = 0.92

B:
  description: >
    Joint state space ℂ × ℂ with coupling term K(z_j - z_i) linking the two
    oscillators. Admissible states: both |z_i| < 5 (numerical bound, never reached
    in practice). Coupling K ∈ [0.01, 0.12] is the sweep parameter; all other
    parameters fixed as above.
  constraints:
    - name: "amplitude_bound"
      form: "inequality"
      expression: "|z1| < 5  AND  |z2| < 5"
      notes: "Numerical stability bound; limit cycles have |z_i| ≈ sqrt(λ_i) ≈ 1"
    - name: "coupling_constraint"
      form: "equation"
      expression: "dz_i/dt = f(z_i; λ_i, ω_i) + K(z_j - z_i)"
      notes: "Diffusive coupling; K=0 gives decoupled oscillators"
  admissible_set:
    notation: "X_B"
    membership_test: "|z1| < 5 AND |z2| < 5 AND K in [0.01, 0.12]"
  boundary_condition_classes:
    - class: "coupling"
      role: >
        Primary BC. K parameterizes the S2 operator: product state space ℂ×ℂ
        with cross-terms mixing z1 and z2 dynamics. Transition at K* ≈ 0.055:
        incoherent → phase-locked.
      primary: true
    - class: "restriction"
      role: >
        Secondary BC. Amplitude parameter λ restricts accessible amplitude range
        via Stuart-Landau nonlinear dissipation. Tested in lambda-robustness sweep.
      primary: false

Pi:
  - id: "pi_01"
    name: "Phase-locking value (PLV)"
    observable_key: "plv"
    primary: true
    map:
      domain: "X_B  (trajectory after t_transient = 50)"
      codomain: "[0, 1]"
      definition: >
        PLV = |mean(exp(i*(angle(z1(t)) - angle(z2(t)))))|
        measured over t ∈ [50, 200]. PLV = 0: uniform phase distribution
        (incoherent). PLV = 1: perfect phase locking (synchronized).
    distinguishability:
      d_pi: "d_PLV(y1, y2) = |PLV_1 - PLV_2|"
      type: "metric"
      units: "dimensionless"
    resolution_floor: "0.01"
    notes: >
      PLV is the relational observable: it measures inter-oscillator phase
      coherence, not individual oscillator properties. This is the Π_rel in
      the ARW emergence formalism. Span across K-sweep: 0.158 to 1.000 = 0.842.
      At ε = 0.09: span/ε = 9.4 — well sufficient.

  - id: "pi_02"
    name: "Local amplitude asymmetry"
    observable_key: "amp_asym"
    primary: false
    map:
      domain: "X_B"
      codomain: "[0, ∞)"
      definition: >
        amp_asym = |mean(|z1(t)|) - mean(|z2(t)|)|
        measured over t ∈ [50, 200]. Measures difference in steady-state
        amplitudes between the two oscillators.
    distinguishability:
      d_pi: "d_amp(y1, y2) = |amp_asym_1 - amp_asym_2|"
      type: "metric"
      units: "dimensionless (amplitude units)"
    notes: >
      Local observable — Π_local in ARW emergence formalism. Crucially:
      amp_asym ≈ 0.076–0.082 across ALL K-values (constant within ε = 0.09).
      This is the collapse condition: the local description is indistinguishable
      under ε = 0.09 regardless of coupling state. Span across K-sweep ≈ 0.006
      — insufficient as primary (span << 2ε).

  - id: "pi_03"
    name: "Mean frequency gap"
    observable_key: "freq_gap"
    primary: false
    map:
      domain: "X_B"
      codomain: "[0, ∞)"
      definition: >
        freq_gap = |mean(dphase1/dt) - mean(dphase2/dt)|
        where phase_i = unwrapped angle of z_i(t).
    notes: >
      Collapses to 0 at K ≈ 0.06 synchronous with PLV. Correlated with PLV;
      PLV is more robust and interpretable as primary relational observable.
      Span: 0.109 (K=0.01) to 0.000 (K≥0.06) — sufficient but redundant with PLV.

Delta:
  - id: "delta_01"
    name: "Initial condition perturbation"
    type: "ic_perturbation"
    action:
      on: "initial_conditions"
      definition: >
        z1(0) = 0.7 + 0.2i, z2(0) = 0.4 - 0.3i (fixed in simulation).
        Perturbation: vary z1(0), z2(0) within disk |z_i(0)| < 0.5.
        N_runs = 10 independent initial conditions per K-value.
    bounds:
      magnitude: "|z_i(0)| < 0.5"
      locality: "acts on both oscillators simultaneously"
    admissibility_rationale: >
      Stuart-Landau oscillators have global attractors (fixed or limit cycle)
      for all K. Initial condition perturbation tests basin robustness — the
      partition must be IC-independent.
    notes: "Single simulation run used for sweep; robustness protocol pending."

  - id: "delta_02"
    name: "Amplitude BC perturbation (lambda-robustness)"
    type: "parameter_kick"
    action:
      on: "parameters"
      definition: >
        Vary λ ∈ [0.4, 1.6] at fixed K=0.03 (weak) and K=0.08 (strong).
        13 lambda-values, linear spacing. Tests whether emergence window
        holds across different amplitude regimes.
    bounds:
      magnitude: "λ ∈ [0.4, 1.6]"
      locality: "global parameter change"
    admissibility_rationale: >
      Lambda variation tests the BC-relative character of the emergence window:
      does the local collapse condition (amp_asym < ε) hold for all λ?
      Result: breaks for weak K at λ > 1.3 (amp_asym approaches ε = 0.09).
    notes: >
      Empirical result from lambda_robustness.csv: weak K amp_asym at λ=1.3 → 0.092,
      at λ=1.4 → 0.095 (exceeds ε = 0.09). Emergence window is λ-bounded.

epsilon:
  value: 0.09
  interpretation: >
    d_PLV(x,y) ≤ 0.09 means the two states are indistinguishable in their
    relational coupling structure. d_amp(x,y) ≤ 0.09 means locally indistinguishable.
  tie_to_perturbations: >
    ε = 0.09 chosen to satisfy the emergence window conditions:
    (1) amp_asym(K_weak=0.03) = 0.082 < ε → local collapse at weak K
    (2) ΔPLV = |PLV(K=0.08) - PLV(K=0.03)| = 0.805 > ε → relational distinction survives
    Emergence window: ε ∈ [0.082, 0.805] — width = 0.723 (wide, robust).
  epsilon_choice_note: >
    ε = 0.09 sits well inside the emergence window [0.082, 0.805].
    Local threshold ≈ 0.082, relational threshold ≈ 0.805.
    Any ε ∈ (0.082, 0.805) yields the emergence condition.
    ε = 0.09 chosen as the smallest value exceeding the local threshold
    with a safety margin of ~10%.
  stability_window_plan:
    vary_epsilon: [0.05, 0.07, 0.09, 0.11, 0.13]
    vary_delta_strength: ["ic_radius=0.1", "ic_radius=0.3", "ic_radius=0.5"]

observable_sufficiency:
  - observable_key: "plv"
    sufficient: true
    reason: >
      span(PLV) = 1.000 - 0.158 = 0.842 >> 2*ε = 0.18.
      PLV distinguishes incoherent (PLV≈0.16) from phase-locked (PLV=1.0) clearly.
  - observable_key: "amp_asym"
    sufficient: false
    reason: >
      span(amp_asym) = 0.082 - 0.073 = 0.009 << 2*ε = 0.18.
      Observable insufficiency — NOT scope rejection. This is the emergence
      condition: amp_asym collapses under ε intentionally (Π_local collapse).
  - observable_key: "freq_gap"
    sufficient: true
    reason: >
      span(freq_gap) = 0.110 >> 2*ε = 0.18 at weak K.
      Collapses to 0 at strong K — correlated with PLV transition.
      Redundant with PLV as primary; retained as secondary confirmation.

expected_partition:
  partition_type: "binary"
  regime_count_predicted: 2
  regimes:
    - id: "R1"
      name: "Incoherent — locally invisible, relationally distinct"
      signature: "PLV ∈ [0.15, 0.68], amp_asym ≈ 0.08"
      bc_conditions: "K < K* ≈ 0.055"
      notes: >
        Local observable (amp_asym) already below ε — local description indistinguishable.
        Relational observable (PLV) distinguishes from R2: PLV_R1 ≈ 0.16–0.68 << PLV_R2 = 1.0.
        This is the emergence regime: relational structure is the only admissible description.
    - id: "R2"
      name: "Phase-locked — locally invisible, relationally maximal"
      signature: "PLV = 1.000, amp_asym ≈ 0.076"
      bc_conditions: "K > K* ≈ 0.055"
      notes: >
        amp_asym is still below ε (local description still indistinguishable).
        PLV = 1 (saturated). Regime is defined entirely by relational structure.

comparability:
  common_underlying_X: "oscillator_amplitude_space"
  transfer_targets:
    - scope_id: "SCOPE-20260311-0001"
      direction: "CASE-20260318-0004 -> CASE-20260311-0001"
      structural_homology_claim: >
        Both Coupling BC cases with binary partition (N=2), incoherent → synchronized.
        Kuramoto: order parameter r_ss. This case: PLV. Both measure collective coherence.
      expected_admissibility: "partial"

falsification:
  - id: "F1"
    condition: "PLV does not distinguish R1 from R2 — span(PLV) < ε"
    measurable_test: "max(PLV) - min(PLV) < 0.09"
    threshold: "0.09"
    severity: "scope_rejection"

  - id: "F2"
    condition: "amp_asym > ε = 0.09 at K=0.08 — emergence window absent"
    measurable_test: "amp_asym(K=0.08) > 0.09"
    threshold: "0.09"
    severity: "scope_rejection"
    notes: >
      This would mean: the local observable is NOT collapsed at the coupling
      strength where PLV = 1. The emergence condition (local collapse BEFORE
      relational collapse) fails. Empirical result: amp_asym(K=0.08) = 0.076 < 0.09.
      F2 not triggered.

  - id: "F3"
    condition: "No robust ε plateau — PLV has no stable N=2 window"
    measurable_test: "epsilon_sweep shows no plateau of width w > 0.5"
    threshold: "w = 0.5"
    severity: "scope_rejection"
    notes: "Emergence window width = 0.723 >> 0.5. F3 not triggered empirically."

  - id: "F4"
    condition: "K* at sweep boundary — K=0.01 or K=0.12"
    measurable_test: "theta_star at boundary of [0.01, 0.12]"
    threshold: "boundary"
    severity: "sweep_refinement"
    notes: "K* ≈ 0.055 is well interior. F4 not triggered."

