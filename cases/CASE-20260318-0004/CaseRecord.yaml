go_nogo:
  criterion: >
    Pipeline recovers N=2 partition with K* in [0.05, 0.07] (interior of sweep).
    PLV sufficient observable (span >> 2*epsilon). amp_asym insufficient (span << 2*epsilon).
    Emergence window epsilon in (0.082, 0.805) confirmed.
  measurable_test: >
    PartitionResult.json: N=2, theta_star in [0.05, 0.07].
    Invariants.json: sweep_range=[0.01, 0.12] present.
    EpsilonSweep: plateau confirmed for epsilon in [0.082, 0.805].
  threshold: "N=2 stable, K* interior, emergence window width > 0.5"
  decision: "go"
  decision_date: "2026-03-29"
  decision_notes: >
    Pipeline result: N=4 (richer than predicted N=2). Three transitions:
    R0 to R1 at K=0.035, R1 to R2 at K=0.045, R2 to R3 at K=0.055.
    Primary phase-locking transition (R2 to R3 at K=0.055) is interior and matches
    go_nogo criterion (K* in [0.05, 0.07]). PLV confirmed sufficient (span=0.842 >> 2*epsilon).
    amp_asym confirmed insufficient (span~0.009 << 2*epsilon) — emergence condition holds.
    Admissible epsilon-interval: I_epsilon=[0.039, 0.184], w=1.551 — robust plateau confirmed.
    N=4 refines predicted N=2 by resolving two intermediate regimes (K=0.04 and K=0.05).
    This is a richer description, not a failure: partition_type=sequential confirmed.
    Transfer to CASE-0001 (Kuramoto): Phi=0.9983 (highly_admissible).
    F1, F2, F3, F4: not triggered. Decision: go.

