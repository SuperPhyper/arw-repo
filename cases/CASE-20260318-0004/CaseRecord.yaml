scientific_value:
  primary: >
    First empirical ARW emergence case. Demonstrates and quantifies the emergence
    window (ε-interval where local collapse precedes relational collapse).
    Provides numerical grounding for the theoretical definitions in
    arw_emergence_bc_relative.md and epsilon_induced_relational_emergence.md.
  secondary: >
    First Coupling BC case with PLV as primary observable (vs r_ss in Kuramoto).
    Lambda-robustness sweep provides first Δ-stability evidence for emergence condition.
    Transfer to CASE-0001 (Kuramoto) will be first same-BC cross-system comparison.
  open_questions:
    - id: "Q-EMERGE-01"
      question: >
        Is the emergence window width (0.723) system-specific or does it generalize?
        Does it scale with the frequency gap (ω2-ω1 = 0.08)?
    - id: "Q-EMERGE-02"
      question: >
        The lambda-robustness breaks at λ > 1.3 for weak K.
        Does this define a 2D emergence region in (K, λ)-space?
        What is the boundary curve K*(λ)?
    - id: "Q-EMERGE-03"
      question: >
        Transfer to Kuramoto (CASE-0001): does PLV-based partition transfer
        to r_ss-based partition? If yes: relational observables may be more
        transferable than local observables across coupled oscillator systems.
