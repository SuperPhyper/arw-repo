go_nogo:
  criterion: >
    Pipeline recovers N=2 partition with K* ∈ [0.05, 0.07] (interior of sweep).
    PLV sufficient observable (span >> 2ε). amp_asym insufficient (span << 2ε).
    Emergence window ε ∈ (0.082, 0.805) confirmed.
  measurable_test: >
    PartitionResult.json: N=2, theta_star ≈ 0.055–0.06.
    Invariants.json: sweep_range=[0.01, 0.12] present.
    EpsilonSweep: plateau of N=2 confirmed for ε ∈ [0.082, 0.805].
  threshold: "N=2 stable, K* interior, emergence window width > 0.5"
  decision: "go"
  decision_date: "2026-03-29"
  decision_notes: >
    Pipeline result: N=4 (richer than predicted N=2). Three transitions:
    R0→R1 at K≈0.035, R1→R2 at K≈0.045, R2→R3 at K≈0.055.
    The primary phase-locking transition (R2→R3 at K≈0.055) is interior and matches
    the go_nogo criterion (K* ∈ [0.05, 0.07]). PLV confirmed sufficient (span=0.842 >> 2ε=0.18).
    amp_asym confirmed insufficient (span≈0.009 << 2ε=0.18) — emergence condition holds.
    Admissible ε-interval: I_ε=[0.039, 0.184], w=1.551 — robust plateau confirmed.
    The N=4 result refines the predicted N=2 by resolving two intermediate regimes
    (K=0.04 and K=0.05) in the synchronization transition. This is a richer description,
    not a failure: the partition_type=sequential is confirmed (linear adjacency graph).
    Transfer to CASE-0001 (Kuramoto): Φ=0.9 (highly_admissible) — first same-BC cross-system
    comparison confirms structural homology at the partition level.
    F1, F2, F3, F4: not triggered (see ScopeSpec.yaml). Decision: go.

