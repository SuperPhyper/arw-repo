description: >
  Two coupled Stuart-Landau oscillators (Hopf normal form) with diffusive coupling K.
  K-sweep across [0.01, 0.12] with 12 points. Primary observable: PLV (phase-locking
  value). Secondary: amp_asym (local amplitude asymmetry). The case demonstrates and
  quantifies ARW relational emergence: amp_asym collapses under ε = 0.09 for all K,
  while PLV cleanly distinguishes two regimes (PLV ≈ 0.16 vs PLV = 1.0).
  Emergence window confirmed: ε ∈ [0.082, 0.805], width = 0.723.
  Lambda-robustness sweep (13 λ-values) confirms Δ-stability for λ ∈ [0.4, 1.3].

