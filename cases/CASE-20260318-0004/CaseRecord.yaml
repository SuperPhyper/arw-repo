description: >
  Two coupled Stuart-Landau oscillators (Hopf normal form) with diffusive coupling K.
  K-sweep across [0.01, 0.12] with 12 points. Primary observable: PLV (phase-locking
  value). Secondary: amp_asym (local amplitude asymmetry). The case demonstrates and
  quantifies ARW relational emergence: amp_asym collapses under epsilon = 0.09 for all K,
  while PLV cleanly distinguishes four regimes (N=4, richer than predicted N=2).
  Emergence window confirmed: epsilon in [0.082, 0.805], width = 0.723.
  Lambda-robustness sweep (13 lambda-values) confirms Delta-stability for lambda in [0.4, 1.3].

