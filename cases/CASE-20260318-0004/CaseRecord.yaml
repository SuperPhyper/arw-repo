    Pipeline recovers N=2 partition with K* ∈ [0.05, 0.07] (interior of sweep).
    PLV sufficient observable (span >> 2ε). amp_asym insufficient (span << 2ε).
    Emergence window ε ∈ (0.082, 0.805) confirmed.
  measurable_test: >
    PartitionResult.json: N=2, theta_star ≈ 0.055–0.06.
    Invariants.json: sweep_range=[0.01, 0.12] present.
    EpsilonSweep: plateau of N=2 confirmed for ε ∈ [0.082, 0.805].
  threshold: "N=2 stable, K* interior, emergence window width > 0.5"
  decision: "pending"
  decision_date: null
  decision_notes: >
    Analytical pre-assessment from simulation data strongly suggests go.
    F1, F2, F3, F4 all not triggered empirically (see ScopeSpec.yaml).
    Formal go_nogo requires PartitionResult.json from pipeline.

