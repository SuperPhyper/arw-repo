scientific_value:
  primary: >
    First empirical ARW emergence case. Demonstrates and quantifies the emergence
    window (epsilon-interval where local collapse precedes relational collapse).
    Provides numerical grounding for the theoretical definitions in
    arw_emergence_bc_relative.md and epsilon_induced_relational_emergence.md.
  secondary: >
    First Coupling BC case with PLV as primary observable (vs r_ss in Kuramoto).
    Lambda-robustness sweep provides first Delta-stability evidence for emergence condition.
    Transfer to CASE-0001 (Kuramoto): first same-BC cross-system comparison.
    Phi=0.9983 confirms structural homology at partition level despite different observable
    BC structures (PLV: C.A.R vs r_ss: R^3.A.D).
  open_questions:
    - id: "Q-EMERGE-01"
      question: >
        Is the emergence window width (0.723) system-specific or does it generalize?
        Does it scale with the frequency gap (omega2-omega1 = 0.08)?
    - id: "Q-EMERGE-02"
      question: >
        The lambda-robustness breaks at lambda > 1.3 for weak K.
        Does this define a 2D emergence region in (K, lambda)-space?
        What is the boundary curve K*(lambda)?
    - id: "Q-EMERGE-03"
      question: >
        Transfer to Kuramoto (CASE-0001): Phi=0.9983 with PLV (C.A.R) vs r_ss (R^3.A.D).
        Relational observables (PLV) appear as transferable as collective observables (r_ss)
        within same-BC-class systems. Does this generalize to other Coupling BC cases?
