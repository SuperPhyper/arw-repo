# ── Scientific Value ─────────────────────────────────────────────────────────
scientific_value:
  primary: >
    First empirical ARW test on a cognitive/computational system with endogenous
    regime structure. Unlike the physical calibration cases (Kuramoto, pendulum,
    Stuart-Landau), regime structure here must EMERGE from agent-environment
    interaction rather than being analytically derivable from equations of motion.
    Positive result extends the ARW partition claim beyond dynamical systems.
  secondary: >
    Establishes the baseline partition structure for Phase 2 (zone switching)
    and Phase 4 (cross-maze transfer). Without a confirmed Phase 1 partition,
    subsequent phase results cannot be interpreted.
  open_questions:
    - id: "Q-CNS-01"
      question: "What is the empirically optimal epsilon_global for the labyrinth partition?"
    - id: "Q-CNS-03"
      question: >
        Is consolidation necessary for regime partition stability? Phase 1
        deliberately disables consolidation — this is the baseline for Q-CNS-03.
    - id: "Q-LABY-01"
      question: >
        Does a single dominant cluster (N=1) emerge as predicted under uniform Zone A BC,
        or does the agent spontaneously generate multiple sub-modes even in the uniform case?

