# CaseRecord.yaml — CASE-20260329-0011
# System: Context-navigation labyrinth agent — Phase 1 (Mode Emergence)
# Purpose: First empirical test of the labyrinth ART instantiation.
#          Verifies that a discrete behavioral regime partition emerges at all
#          under uniform Zone A boundary conditions (single-zone environment).

schema_version: "0.2"
id: "CASE-20260329-0011"
title: "Labyrinth agent — Phase 1: Mode emergence under uniform Zone A scope"
phase: "1"
system: "labyrinth"
status: "open"
created_at: "2026-03-29"
updated_at: "2026-03-29"

description: >
  Phase 1 of the labyrinth ART instantiation. The agent operates in a single uniform
  10x10 grid environment with Zone A boundary conditions (low action cost, large
  visibility radius, no memory). The scientific question is whether a discrete
  regime partition emerges in the agent's behavioral space (policy embedding cluster
  structure) under a single fixed BC configuration. This is a prerequisite for all
  subsequent phases. No BC parameter sweep; the only sweep is over the resolution
  threshold epsilon applied to the mode_dist observable.

