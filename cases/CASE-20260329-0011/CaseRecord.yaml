# ── Go/No-Go Criteria ────────────────────────────────────────────────────────
go_nogo:
  criterion: >
    The epsilon-sweep over mode_dist observations shows at least one stable
    plateau with N >= 1 distinct regime cluster, indicating that a discrete
    behavioral partition emerges under uniform Zone A BC.
  measurable_test: >
    epsilon_sweep produces a plateau of width >= 3 consecutive epsilon values
    with constant N (regime count). Plateau must be present in at least 80%
    of independent training runs (different random seeds, delta_04).
  threshold: "plateau_width >= 3 epsilon steps; reproducibility >= 80%"
  decision: "pending"
  decision_date: ""
  decision_notes: ""

