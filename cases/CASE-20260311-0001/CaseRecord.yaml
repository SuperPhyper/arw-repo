# CaseRecord.yaml — Case Envelope
# Version: 0.2
#
# A Case bundles all artifacts for a single experiment instance:
# ScopeSpec → BCManifest → PartitionResult → TransferReport → FailureAudit
#
# Each Case corresponds to one row of work: one system, one scope, one sweep program.
# Generated by: python -m pipeline.new_case --id CASE-20260311-0001 --template <template>

schema_version: "0.2"
id: "CASE-20260311-0001"
title: "Kuramoto Oscillators — Phase 1 Calibration"
phase: "1"                           # 0 | 1 | 2a | 2b | 2c | 3 | 4
system: "kuramoto"                          # kuramoto | pendulum | consensus | meanfield |
#                                   # labyrinth | custom
status: "complete"                      # open | in_progress | complete | failed | archived
created_at: "2026-03-11"
updated_at: "2026-03-12"

description: "Kuramoto N=500, κ∈[0,3], 36 sweep points. N=4 regimes at ε=0.09. Transfer with CASE-0002 (Coupling↔Coupling, Φ=0.675) and CASE-0003 (Coupling↔Restriction, Φ=0.40/0.95*)."                     # 2-3 sentence plain-language summary

# ── Artifact Registry ────────────────────────────────────────────────────────
# All artifacts for this case. Status: pending | draft | complete | failed
