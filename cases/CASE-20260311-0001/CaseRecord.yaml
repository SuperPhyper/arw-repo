  scope_spec:
    id: "SCOPE-20260311-0001"                  # SCOPE-YYYYMMDD-####
    path: "ScopeSpec.yaml"
    status: "pending"

  bc_manifest:
    id: "BCM-20260311-0001"                    # BCM-YYYYMMDD-####
