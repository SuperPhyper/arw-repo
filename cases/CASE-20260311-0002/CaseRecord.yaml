# CaseRecord.yaml — Case Envelope
# Version: 0.2
#
# A Case bundles all artifacts for a single experiment instance:
# ScopeSpec → BCManifest → PartitionResult → TransferReport → FailureAudit
#
# Each Case corresponds to one row of work: one system, one scope, one sweep program.
# Generated by: python -m pipeline.new_case --id CASE-20260311-0002 --template <template>

schema_version: "0.2"
id: "CASE-20260311-0002"
title: "Multi-Link Pendulum — Phase 1 Calibration"
phase: "1"                           # 0 | 1 | 2a | 2b | 2c | 3 | 4
system: "pendulum"                          # kuramoto | pendulum | consensus | meanfield |
#                                   # labyrinth | custom
status: "complete"                      # open | in_progress | complete | failed | archived
created_at: "2026-03-11"
updated_at: "2026-03-12"

description: "4-link pendulum, κ∈[0,10], 25 sweep points, fixed γ=0.1. N=3 regimes at ε=0.023 (fragil). Primary: var_rel. Transfer with CASE-0001 (Coupling↔Coupling, Φ=0.675)."                     # 2-3 sentence plain-language summary

# ── Artifact Registry ────────────────────────────────────────────────────────
# All artifacts for this case. Status: pending | draft | complete | failed
artifacts:
  scope_spec:
    id: "SCOPE-20260311-0002"                  # SCOPE-YYYYMMDD-####
    path: "ScopeSpec.yaml"
    status: "pending"

  bc_manifest:
    id: "BCM-20260311-0002"                    # BCM-YYYYMMDD-####
    path: "BCManifest.yaml"
    status: "pending"

  partition_result:
    id: ""                          # PIPE-YYYYMMDD-####
    path: "results/PartitionResult.json"
    status: "pending"
    produced_by: "pipeline.extract_partition"

  invariants:
    path: "results/partition/Invariants.json"
    status: "complete"
    produced_by: "pipeline.invariants"

  transfer_report:
    path: "transfer/pendulum_vs_kuramoto/TransferReport.md"
    status: "complete"
    produced_by: "pipeline.transfer"
    counterpart_case_id: "CASE-20260311-0001"         # CASE-... of the other scope

  failure_audit:
    path: "audits/FailureAudit_Phase1.md"
    status: "complete"
    produced_by: "pipeline.audit_helpers"

# ── Go/No-Go Criteria ────────────────────────────────────────────────────────
# From docs/overview/roadmap.md — copy the relevant criterion for this phase
go_nogo:
  criterion: "Stable epsilon-plateau with N>=2 and w>0.3 recoverable"
  measurable_test: "max plateau width w for N>=2; transfer Phi >= 0.6 with CASE-0001"
  threshold: "w>0.3 and Phi>=0.6"
  decision: "go"
  decision_date: "2026-03-12"
  decision_notes: "N=2 plateau w=0.551. Phi=0.675. N=3 plateau fragil (w=0.000) — dokumentiert, akzeptiert."

# ── Links ────────────────────────────────────────────────────────────────────
links:
  experiment_doc: "experiments/multi_link_pendulum.md"                # e.g., experiments/kuramoto_oscillators.md
  bc_doc: "docs/bc_taxonomy/boundary_condition_classes.md"                        # e.g., docs/bc_taxonomy/boundary_condition_classes.md
  related_cases: ["CASE-20260311-0001"]                 # CASE-... ids of paired/transfer cases

# ── Agent Assignments ────────────────────────────────────────────────────────
