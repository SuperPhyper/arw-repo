# ScopeSpec.yaml — Canonical ART Scope Instantiation Schema
# Version: 0.2 (aligned with arw-repo docs/bc_taxonomy and docs/core)
#
# An ART scope is a tuple S = (B, Π, Δ, ε) over a structured state space X.
# This schema forces explicit specification of all four components.
# ARW itself makes no empirical claims; all content here belongs to ART.
#
# Usage: copy to cases/CASE-YYYYMMDD-####/ScopeSpec.yaml and fill in.
# Validate with: python -m pipeline.validate --case cases/CASE-...

schema_version: "0.2"
id: "SCOPE-YYYYMMDD-####"          # unique identifier; generated by pipeline.new_case
title: "Short descriptive name"
status: "draft"                     # draft | active | frozen
created_at: "YYYY-MM-DD"
updated_at: "YYYY-MM-DD"
system_domain: ""                   # physical | social | cognitive | computational | other

# ── ART: underlying state space ─────────────────────────────────────────────
X:
  name: ""
  type: ""                          # manifold | graph | simplex | vector_space | product | other
  structure:
    topology: true                  # required minimum
    metric: "none"                  # none | required | optional
    measure: "none"                 # none | optional | required
  state_coordinates:
    - name: ""
      domain: ""                    # R | R^n | [0,1] | finite_set | ...
      description: ""               # meaning inside this scope only
  notes: ""

# ── ART: constraints selecting admissible subset X_B ⊆ X ────────────────────
B:
  description: ""                   # natural language summary
  constraints:
    - name: ""
      form: ""                      # equation | inequality | membership | logic | topological
      expression: ""                # formal statement
      notes: ""                     # physical/semantic rationale
  admissible_set:
    notation: "X_B"
    membership_test: ""             # pseudocode or predicate: "x in X_B iff ..."
  boundary_condition_classes:       # from docs/bc_taxonomy/boundary_condition_classes.md
    - class: ""                     # restriction | coupling | symmetry_breaking |
      #                             # dissipation | forcing | aggregation
      role: ""                      # how this BC class manifests in this scope
      primary: true                 # is this the dominant BC class?

# ── ART: admissible descriptions/projections Π ──────────────────────────────
Pi:
  - id: "pi_01"
    name: ""
    observable_key: ""              # machine-readable key matching extract_partition output
    #                               # e.g. "r_ss" | "var_rel" | "lambda_proxy"
    primary: true                   # true for the observable used by pipeline.extract_partition
    #                               # exactly one Pi entry must have primary: true
    map:
      domain: "X_B"
      codomain: ""
      definition: ""                # formula, algorithm, or reference
    distinguishability:
      d_pi: ""                      # definition of d_pi(y1, y2)
      type: ""                      # metric | pseudo_metric | divergence | classifier_margin
      units: ""
    resolution_floor: ""            # smallest resolvable difference (optional)
    noise_model: ""                 # optional
    notes: ""

# ── ART: admissible perturbations Δ ─────────────────────────────────────────
Delta:
  - id: "delta_01"
    name: ""
    type: ""                        # bounded_noise | local_intervention | parameter_kick |
    #                               # rewiring | projection_change | ic_perturbation | other
    action:
      on: ""                        # state | parameters | graph | measurement | initial_conditions
      definition: ""
    bounds:
      magnitude: ""                 # e.g., "||δx|| <= 0.01"
      locality: ""                  # e.g., "acts on single component"
    admissibility_rationale: ""     # why considered admissible (not a scope-transition trigger)
    notes: ""

# ── ART: resolution threshold ε > 0 ─────────────────────────────────────────
epsilon:
  value: null                       # numeric value
  interpretation: ""                # "d_Π(x,y) ≤ ε means x ~_S y"
  tie_to_perturbations: ""          # e.g., "ε ~ sup_{δ∈Δ} E[d_Π(δ(x), x)]"
  epsilon_choice_note: ""           # document ε fragility; e.g. "ε sits on plateau boundary
                                    # N=k→k-1; alternatives: ε=X (N=k) or ε=Y (N=k-1)"
  stability_window_plan:
    vary_epsilon: []                # e.g., [0.005, 0.01, 0.02]
    vary_delta_strength: []         # e.g., ["sigma=0.1", "sigma=0.2"]

# ── Observable sufficiency ───────────────────────────────────────────────────
# Checked per-observable before any BC-level falsification.
# Insufficient observables are replaced (not scope-rejected).
observable_sufficiency:
  - observable_key: ""             # must match Pi[*].observable_key
    sufficient: true               # true | false
    reason: ""                     # e.g. "span=0.274 >> 2*epsilon=0.046"
    #       if false: "span=0.037 < 2*epsilon — observable_insufficiency, replace pi"

# ── Expected regime partition ────────────────────────────────────────────────
# (predicted before running; updated after extraction)
expected_partition:
  partition_type: ""                # binary | sequential | clustered | multi_stable | hierarchical
  #                                 # (from docs/bc_taxonomy/partition_types.md)
  regime_count_predicted: null
  regimes:
    - id: "R1"
      name: ""
      signature: ""                 # what distinguishes this regime in Π
      bc_conditions: ""             # which BC configuration produces this regime
      notes: ""

# ── Comparability with other scopes ─────────────────────────────────────────
comparability:
  common_underlying_X: ""          # id of shared X if comparing across scopes
  overlap_domain: ""               # how to define X_B1 ∩ X_B2
  transfer_targets:
    - scope_id: ""                 # SCOPE-... of target scope
      direction: ""                # "this -> target" or "target -> this"
      structural_homology_claim: ""
      expected_admissibility: ""   # admissible | partial | inadmissible | unknown

# ── Falsification conditions ─────────────────────────────────────────────────
# Operate at BC level (not observable level — observable insufficiency is handled
# separately in observable_sufficiency above).
#
# Severity values:
#   observable_replacement — F0: R(π) ∩ B ≠ B; the observable's pre-scopal
#                            substrate fails structurally (exclusion zone Z(π)
#                            overlaps B). Replace the observable class; the scope
#                            and BC remain valid. Distinct from F1 (span failure).
#                            See docs/glossary/observable_range.md.
#   scope_rejection        — F1(BC)/F2/F3: the BC cannot generate a valid partition
#   sweep_refinement       — F4: θ* at sweep boundary; measurement gap, not a failure
#
# F0 entries should identify: which observable, which assumption fails, and Z(π) ∩ B.
falsification:
  - id: "F1"
    condition: ""                   # what empirical finding would weaken this instantiation
    measurable_test: ""
    threshold: ""
    severity: "scope_rejection"    # observable_replacement | scope_rejection | sweep_refinement

# ── Provenance ───────────────────────────────────────────────────────────────
provenance:
  sources:
    - type: ""                      # paper | note | dataset | conversation | experiment_doc
      ref: ""                       # bibkey or filename
      pointer: ""                   # page/section
  owners:
    - role: "ScopeFormalizer"
      name: ""
  links:
    bc_manifest_id: ""              # BCM-YYYYMMDD-####
    case_record_id: ""              # CASE-YYYYMMDD-####
    experiment_doc: ""              # e.g., experiments/kuramoto_oscillators.md
